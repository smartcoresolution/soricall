services:
  postgres:
    image: postgres:16
    container_name: soricall-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - soricall_pg_data_prod:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build:
      context: ../../services/api
      dockerfile: ../../infra/docker/api.Dockerfile
    container_name: soricall-api-prod
    restart: unless-stopped
    env_file:
      - ../../.env.production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ai

  ai:
    build:
      context: ../../services/ai
      dockerfile: ../../infra/docker/ai.Dockerfile
    container_name: soricall-ai-prod
    restart: unless-stopped
    env_file:
      - ../../.env.production
    ports:
      - "8100:8100"

volumes:
  soricall_pg_data_prod:

