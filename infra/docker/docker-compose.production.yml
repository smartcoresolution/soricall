services:
  postgres:
    image: postgres:16
    container_name: soricall-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - soricall_pg_data_prod:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../../services/api
      dockerfile: ../../infra/docker/api.Dockerfile
    container_name: soricall-api-prod
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-../../.env.production}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  ai:
    build:
      context: ../../services/ai
      dockerfile: ../../infra/docker/ai.Dockerfile
    container_name: soricall-ai-prod
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-../../.env.production}
    ports:
      - "127.0.0.1:8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  soricall_pg_data_prod:
