# Include these locations in every HTTP/HTTPS server block that serves SoriCall.
location = /soricall {
    return 301 /soricall/;
}

# Let Android browsers recognize the download as an installable APK.
location = /soricall/downloads/soricall.apk {
    alias /var/www/soricall/downloads/soricall.apk;
    default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="SoriCall.apk"' always;
    add_header X-Content-Type-Options nosniff always;
}

location ^~ /soricall/ {
    alias /var/www/soricall/;
    add_header Permissions-Policy "microphone=(self)" always;
    try_files $uri $uri/ /soricall/index.html;
}

location ^~ /soricall-api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
}
