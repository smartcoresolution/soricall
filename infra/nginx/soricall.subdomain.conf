# Dedicated SoriCall desktop/mobile web origin.
# Install as /etc/nginx/sites-available/soricall-subdomain, enable it, then run
# certbot --nginx -d soricall.ansimsori.ai to add the HTTPS certificate block.
server {
    listen 80;
    listen [::]:80;
    server_name soricall.ansimsori.ai;

    root /var/www/soricall-subdomain;
    index index.html;
    client_max_body_size 20m;

    location /downloads/ {
        try_files $uri =404;
        add_header X-Content-Type-Options nosniff always;
    }

    location /soricall-api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location / {
        add_header Permissions-Policy "microphone=(self), camera=(self)" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
