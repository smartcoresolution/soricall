<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f7770" />
    <meta name="description" content="SoriCall 가족 사칭 전화 보호 모바일 웹앱" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SoriCall" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
    <title>SoriCall</title>
    <script>
      window.addEventListener("error", function (event) {
        var target = event.target;
        if (!target || target.tagName !== "SCRIPT" || sessionStorage.getItem("soricall_asset_recovery") === "1") return;
        sessionStorage.setItem("soricall_asset_recovery", "1");
        Promise.all([
          navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function (items) { return Promise.all(items.map(function (item) { return item.unregister(); })); }) : Promise.resolve(),
          window.caches ? caches.keys().then(function (keys) { return Promise.all(keys.map(function (key) { return caches.delete(key); })); }) : Promise.resolve()
        ]).finally(function () {
          var url = new URL(window.location.href);
          url.searchParams.set("reload", Date.now().toString());
          window.location.replace(url.toString());
        });
      }, true);
      window.addEventListener("load", function () {
        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (root && root.childElementCount > 0) sessionStorage.removeItem("soricall_asset_recovery");
        }, 1000);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
